<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin:0;
    font-family: Inter, sans-serif;
    background: #0a0a0a;
    color: white;
}

/* Layout */
.container {
    padding:20px;
}

/* Balance */
.balance {
    font-size:42px;
    font-weight:600;
}

/* Energy bar */
.energy {
    margin-top:10px;
    height:8px;
    background:#222;
    border-radius:10px;
}

.energy-fill {
    height:100%;
    width:0%;
    background:#00ffae;
    border-radius:10px;
}

/* Tap button */
.tap {
    width:180px;
    height:180px;
    border-radius:50%;
    margin:40px auto;
    background: radial-gradient(circle, #00ffae, #005f4b);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    transition:0.1s;
}

.tap:active {
    transform:scale(0.9);
}

/* Card */
.card {
    margin-top:20px;
    padding:15px;
    background:#111;
    border-radius:15px;
}
</style>
</head>

<body>

<div class="container">

<div id="user"></div>

<div class="balance" id="balance">0</div>

<div class="energy">
    <div class="energy-fill" id="energy"></div>
</div>

<div class="tap" onclick="tap()">TAP</div>

<div class="card">
    Level: <span id="level">1</span><br><br>
    <button onclick="upgrade()">Upgrade</button>
</div>

</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const user = tg.initDataUnsafe?.user;
let user_id = user ? user.id : 1;

document.getElementById("user").innerText =
    user ? "@" + user.username : "Guest";

/* Smooth balance animation */
let displayBalance = 0;

function animateBalance(target){
    displayBalance += (target - displayBalance) * 0.2;
    document.getElementById("balance").innerText = displayBalance.toFixed(2);
}

/* Sync */
async function sync(){
    let res = await fetch('/sync', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({user_id})
    });

    let data = await res.json();

    animateBalance(data.balance);

    document.getElementById("level").innerText = data.level;

    document.getElementById("energy").style.width =
        data.energy + "%";
}

/* Tap */
async function tap(){
    await fetch('/tap',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({user_id})
    });
}

/* Upgrade */
async function upgrade(){
    await fetch('/upgrade',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({user_id})
    });
}

/* Loop */
setInterval(sync, 1000);
sync();
</script>

</body>
</html>
