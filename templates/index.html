<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Miner</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: white;
}

/* Container */
.container {
    padding: 20px;
}

/* Header */
.header {
    font-size: 20px;
    opacity: 0.7;
}

/* Balance */
.balance {
    font-size: 50px;
    font-weight: bold;
    margin: 20px 0;
}

/* Card */
.card {
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    padding: 20px;
    backdrop-filter: blur(15px);
    box-shadow: 0 0 30px rgba(0,255,255,0.1);
}

/* Mining circle */
.miner {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    margin: 40px auto;
    background: radial-gradient(circle, #00f5d4, #0077b6);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    box-shadow: 0 0 40px rgba(0,255,255,0.6);
    animation: pulse 2s infinite;
}

/* Pulse animation */
@keyframes pulse {
    0% { box-shadow: 0 0 20px rgba(0,255,255,0.3); }
    50% { box-shadow: 0 0 60px rgba(0,255,255,0.8); }
    100% { box-shadow: 0 0 20px rgba(0,255,255,0.3); }
}

/* Progress bar */
.progress {
    height: 10px;
    background: #111;
    border-radius: 10px;
    overflow: hidden;
    margin-top: 15px;
}

.bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #00f5d4, #0ea5e9);
    transition: width 0.2s;
}
</style>
</head>

<body>

<div class="container">

    <div class="header" id="user">Loading...</div>

    <div class="balance" id="balance">0</div>

    <div class="card">
        <div class="miner">MINING</div>

        <div class="progress">
            <div class="bar" id="bar"></div>
        </div>
    </div>

</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const user = tg.initDataUnsafe?.user;
let user_id = user ? user.id : 1;

// tampilkan username
document.getElementById("user").innerText =
    user ? "@" + user.username : "Guest";

// auto sync ke backend
async function sync() {
    let res = await fetch('/sync', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({user_id})
    });

    let data = await res.json();
    document.getElementById('balance').innerText = data.balance;
}

// progress animation
let progress = 0;
setInterval(() => {
    progress += 2;
    if (progress > 100) progress = 0;
    document.getElementById("bar").style.width = progress + "%";
}, 100);

// auto mining tiap 1 detik
setInterval(sync, 1000);

// load awal
sync();
</script>

</body>
</html>
