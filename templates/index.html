<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0f19;
    color: white;
}

/* Header */
.header {
    padding: 15px;
    font-size: 18px;
    opacity: 0.7;
}

/* Balance */
.balance {
    font-size: 40px;
    font-weight: bold;
    padding: 15px;
}

/* Card */
.card {
    margin: 15px;
    padding: 15px;
    background: #111827;
    border-radius: 15px;
}

/* Chart */
canvas {
    width: 100% !important;
    height: 200px !important;
}

/* Mining */
.miner {
    text-align: center;
    margin-top: 20px;
}

.upgrade {
    margin-top: 10px;
    padding: 10px;
    background: #22c55e;
    border: none;
    border-radius: 10px;
    color: white;
}
</style>
</head>

<body>

<div class="header" id="user">Loading...</div>

<div class="balance" id="balance">0</div>

<div class="card">
    <canvas id="chart"></canvas>
</div>

<div class="card miner">
    <div>⛏ Mining Speed: <span id="speed">1</span>x</div>
    <button class="upgrade" onclick="upgrade()">Upgrade Miner</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const user = tg.initDataUnsafe?.user;
let user_id = user ? user.id : 1;

document.getElementById("user").innerText =
    user ? "@" + user.username : "Guest";

/* SYNC */
async function sync() {
    let res = await fetch('/sync', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({user_id})
    });

    let data = await res.json();
    document.getElementById('balance').innerText = data.balance;
    document.getElementById('speed').innerText = data.speed;
}

/* UPGRADE */
async function upgrade() {
    let res = await fetch('/upgrade', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({user_id})
    });

    let data = await res.json();
    document.getElementById('balance').innerText = data.balance;
    document.getElementById('speed').innerText = data.speed;
}

/* AUTO LOOP */
setInterval(sync, 1000);
sync();

/* CHART */
let ctx = document.getElementById('chart').getContext('2d');

let chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: 'Price',
            data: [],
            borderWidth: 2
        }]
    },
    options: {
        responsive: true,
        plugins: {legend: {display: false}}
    }
});

async function loadChart() {
    let res = await fetch('/chart');
    let data = await res.json();

    chart.data.labels = data.map((_, i) => i);
    chart.data.datasets[0].data = data;
    chart.update();
}

setInterval(loadChart, 3000);
loadChart();
</script>

</body>
</html>
