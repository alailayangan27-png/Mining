<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
    margin:0;
    background:#05070d;
    font-family: Inter, sans-serif;
    color:white;
}

/* HEADER */
.top{
    padding:20px;
    font-size:14px;
    opacity:0.6;
}

/* BALANCE */
.balance{
    font-size:48px;
    font-weight:700;
    padding:0 20px;
}

/* ENERGY BAR */
.energy{
    margin:15px 20px;
    height:6px;
    background:#111;
    border-radius:10px;
}
.energy-fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#00ffa3,#00c3ff);
    border-radius:10px;
}

/* MINER CORE */
.core{
    width:200px;
    height:200px;
    margin:40px auto;
    border-radius:50%;
    background: radial-gradient(circle,#00ffa3,#002f2a);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
    box-shadow:0 0 60px rgba(0,255,150,0.3);
    transition:.1s;
}

.core:active{
    transform:scale(0.92);
}

/* FLOAT TEXT */
.float{
    position:absolute;
    color:#00ffa3;
    font-weight:bold;
    animation: floatUp 1s forwards;
}
@keyframes floatUp{
    to{
        transform:translateY(-50px);
        opacity:0;
    }
}

/* CARD */
.card{
    margin:20px;
    padding:15px;
    background:#0f141c;
    border-radius:12px;
}
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#00ffa3;
}
</style>
</head>

<body>

<div class="top" id="user"></div>

<div class="balance" id="balance">0.000</div>

<div class="energy">
    <div class="energy-fill" id="energy"></div>
</div>

<div class="core" onclick="tap(event)">MINE</div>

<div class="card">
    Level <span id="level">1</span>
    <button onclick="upgrade()">Upgrade</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const user = tg.initDataUnsafe?.user;
let user_id = user ? user.id : 1;

document.getElementById("user").innerText =
    user ? "@"+user.username : "Guest";

/* SMOOTH BALANCE */
let shown = 0;
function updateBalance(target){
    shown += (target - shown)*0.15;
    document.getElementById("balance").innerText = shown.toFixed(3);
}

/* SYNC LOOP */
async function sync(){
    let r = await fetch('/sync',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({user_id})
    });
    let d = await r.json();

    updateBalance(d.balance);
    document.getElementById("level").innerText = d.level;
    document.getElementById("energy").style.width = d.energy+"%";
}

/* TAP */
async function tap(e){
    let r = await fetch('/tap',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({user_id})
    });
    let d = await r.json();

    if(d.gain > 0){
        navigator.vibrate(20);

        let el = document.createElement("div");
        el.className="float";
        el.innerText="+"+d.gain;
        el.style.left=e.clientX+"px";
        el.style.top=e.clientY+"px";
        document.body.appendChild(el);

        setTimeout(()=>el.remove(),1000);
    }
}

/* UPGRADE */
async function upgrade(){
    await fetch('/upgrade',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({user_id})
    });
}

/* LOOP */
setInterval(sync, 1000);
sync();
</script>

</body>
</html>
