<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mining App</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: white;
}

.container {
    padding: 20px;
}

.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 20px;
    border: 1px solid rgba(255,255,255,0.1);
}

.balance {
    font-size: 32px;
    font-weight: bold;
    background: linear-gradient(90deg,#22c55e,#4ade80);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.rate {
    color: #38bdf8;
}

.button {
    background: linear-gradient(135deg,#3b82f6,#9333ea);
    padding: 15px;
    text-align: center;
    border-radius: 14px;
    margin-top: 15px;
    cursor: pointer;
    transition: 0.2s;
    box-shadow: 0 0 20px rgba(147,51,234,0.4);
}

.button:hover {
    transform: scale(1.05);
}

.glow {
    text-shadow: 0 0 10px #22c55e, 0 0 20px #22c55e;
}

</style>
</head>

<body>

<div class="container">

    <div class="card">
        <div>💰 Balance</div>
        <div class="balance glow" id="balance">0.000000</div>
    </div>

    <div class="card">
        <div>⚡ Mining Speed</div>
        <div class="rate" id="rate">+0.00005/sec</div>
    </div>

    <div class="card">
        <div class="button" onclick="startMining()">🚀 Start Mining</div>
        <div class="button" onclick="upgrade()">⬆ Upgrade Miner</div>
    </div>

</div>

<script>

let mining = false;
let balance = 0;
let speed = 0.00005;
let multiplier = 1;

function startMining(){
    mining = true;
}

setInterval(() => {
    if(mining){
        balance += speed * multiplier;
        document.getElementById("balance").innerText = balance.toFixed(6);
    }
}, 1000);

function upgrade(){
    multiplier += 0.5;
    document.getElementById("rate").innerText = "+" + (speed * multiplier).toFixed(6) + "/sec";
}

</script>

</body>
</html>
