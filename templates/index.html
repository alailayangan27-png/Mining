<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mining App</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#0f172a,#020617);
    color:white;
}

.container {
    padding:20px;
}

.card {
    background: rgba(255,255,255,0.05);
    border-radius:20px;
    padding:20px;
    margin-bottom:15px;
    backdrop-filter: blur(10px);
}

.balance {
    font-size:30px;
    font-weight:bold;
}

button {
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    margin-top:10px;
    font-size:16px;
}

.tap {
    background:#22c55e;
}

.upgrade {
    background:#3b82f6;
}

.energy {
    height:10px;
    background:#1e293b;
    border-radius:10px;
    overflow:hidden;
}

.energy-bar {
    height:100%;
    background:#22c55e;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
    <div>Balance</div>
    <div class="balance" id="balance">0</div>
</div>

<div class="card">
    <div>Energy</div>
    <div class="energy">
        <div class="energy-bar" id="energyBar"></div>
    </div>
</div>

<div class="card">
    <canvas id="chart"></canvas>
</div>

<div class="card">
    <button class="tap" onclick="tap()">⛏ Tap Mining</button>
    <button class="upgrade" onclick="upgrade()">⬆ Upgrade</button>
</div>

</div>

<script>
let user_id = Math.floor(Math.random()*1000000)
let chartData = []

const ctx = document.getElementById('chart')

const chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: 'Balance',
            data: [],
            borderColor: '#22c55e',
            tension: 0.4
        }]
    }
})

async function sync() {
    let res = await fetch('/sync', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({user_id})
    })

    let data = await res.json()

    document.getElementById("balance").innerText = data.balance
    document.getElementById("energyBar").style.width = data.energy + "%"

    chart.data.labels.push('')
    chart.data.datasets[0].data.push(data.balance)

    if(chart.data.labels.length > 20){
        chart.data.labels.shift()
        chart.data.datasets[0].data.shift()
    }

    chart.update()
}

async function tap(){
    await fetch('/tap',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({user_id})
    })
}

async function upgrade(){
    await fetch('/upgrade',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({user_id})
    })
}

setInterval(sync,1000)
</script>

</body>
</html>
